services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: contextbrain
      POSTGRES_PASSWORD: contextbrain
      POSTGRES_DB: contextbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://contextbrain:contextbrain@db:5432/contextbrain
      DATABASE_URL_SYNC: postgresql://contextbrain:contextbrain@db:5432/contextbrain
      CHROMA_MODE: local
      CHROMA_PERSIST_DIR: /app/chroma_data
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./sample_specs:/app/sample_specs
      - chromadata:/app/chroma_data

volumes:
  pgdata:
  chromadata:
