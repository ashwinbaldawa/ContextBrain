services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: apibrain
      POSTGRES_PASSWORD: apibrain
      POSTGRES_DB: apibrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apibrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://apibrain:apibrain@db:5432/apibrain
      DATABASE_URL_SYNC: postgresql://apibrain:apibrain@db:5432/apibrain
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./sample_specs:/app/sample_specs

volumes:
  pgdata:
